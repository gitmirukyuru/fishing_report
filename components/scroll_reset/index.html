<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:transparent;">
<script>
(function () {
  function sendReady() {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 },
      "*"
    );
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setFrameHeight", height: 0 },
      "*"
    );
  }

  function resetScroll() {
    var targets = [window.parent, window.top];
    for (var i = 0; i < targets.length; i++) {
      try {
        var els = targets[i].document.querySelectorAll(
          '[data-testid="stDialogScrollArea"]'
        );
        for (var j = 0; j < els.length; j++) {
          els[j].scrollTop = 0;
        }
      } catch (e) {}
    }
  }

  window.addEventListener("message", function (event) {
    if (event.data.type !== "streamlit:render") return;
    // 複数のタイミングでリセット（コンテンツの遅延レンダリング対策）
    [0, 50, 150, 300, 600, 1000, 1600, 2400].forEach(function (t) {
      setTimeout(resetScroll, t);
    });
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: 1 },
      "*"
    );
  });

  sendReady();
})();
</script>
</body>
</html>
