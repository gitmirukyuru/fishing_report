<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:transparent;overflow:hidden;">
<script>
(function () {
  function post(type, data) {
    window.parent.postMessage(
      Object.assign({ isStreamlitMessage: true, type: type }, data), "*"
    );
  }
  post("streamlit:componentReady", { apiVersion: 1 });
  post("streamlit:setFrameHeight", { height: 0 });

  /* Streamlit のメインスクロールコンテナ候補（バージョンにより異なる） */
  var MAIN_SELS = [
    '[data-testid="stMain"]',
    '[data-testid="stAppViewContainer"]',
    'section.main',
    '.main'
  ];
  /* ダイアログ内スクロール */
  var DIALOG_SEL = '[data-testid="stDialogScrollArea"]';

  function scrollTo0(w) {
    try {
      /* ページ本体 */
      MAIN_SELS.forEach(function (sel) {
        w.document.querySelectorAll(sel).forEach(function (el) {
          el.scrollTop = 0;
        });
      });
      w.document.documentElement.scrollTop = 0;
      w.document.body.scrollTop = 0;
      w.scrollTo(0, 0);
      /* ダイアログ内 */
      w.document.querySelectorAll(DIALOG_SEL).forEach(function (el) {
        el.scrollTop = 0;
      });
    } catch (e) {}
  }

  function reset() {
    scrollTo0(window.parent);
    try { scrollTo0(window.top); } catch (e) {}
  }

  window.addEventListener("message", function (event) {
    if (event.data.type !== "streamlit:render") return;

    /* レンダリング完了前後の複数タイミングで実行 */
    [0, 80, 200, 400, 800, 1500].forEach(function (t) {
      setTimeout(reset, t);
    });

    post("streamlit:setComponentValue", { value: 1 });
  });
})();
</script>
</body>
</html>
